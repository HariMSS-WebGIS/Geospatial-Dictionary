<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#070a13" />
    </linearGradient>

    <!-- Globe Gradient -->
    <radialGradient id="globeGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="70%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </radialGradient>

    <!-- Cyan/Blue Glow Gradient for grid -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glass Overlay Gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02" />
    </linearGradient>

    <!-- Pin Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Ring / Orbit -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#glowGrad)" stroke-width="4" stroke-dasharray="10, 15" opacity="0.4" />

  <!-- The Globe -->
  <circle cx="256" cy="256" r="160" fill="url(#globeGrad)" />

  <!-- Globe Grid Lines (Latitudes and Longitudes) -->
  <g opacity="0.35" stroke="#ffffff" stroke-width="3" fill="none">
    <!-- Latitudes -->
    <line x1="96" y1="256" x2="416" y2="256" />
    <path d="M 117 176 Q 256 220 395 176" />
    <path d="M 117 336 Q 256 292 395 336" />
    <!-- Longitudes -->
    <path d="M 256 96 Q 256 256 256 416" />
    <path d="M 256 96 Q 160 256 256 416" />
    <path d="M 256 96 Q 352 256 256 416" />
  </g>

  <!-- Interactive Search / Map Pin Icon (Glow Overlay) -->
  <g filter="url(#shadow)">
    <!-- Map Pin Shape -->
    <path d="M 256 120 C 200 120 160 160 160 216 C 160 288 256 380 256 380 C 256 380 352 288 352 216 C 352 160 312 120 256 120 Z" 
          fill="url(#glassGrad)" stroke="#06b6d4" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Outer glassmorphism ring -->
    <circle cx="256" cy="216" r="40" fill="#0a0f1d" stroke="#ffffff" stroke-width="3" opacity="0.9" />
    
    <!-- Magnifying Glass / Dictionary Symbol in Pin -->
    <!-- Book/Dictionary symbol inside pin -->
    <path d="M 240 200 L 256 200 C 262 200 268 205 268 210 L 268 228 M 240 206 H 256 M 240 212 H 256 M 240 218 H 256" 
          stroke="#06b6d4" stroke-width="3" fill="none" stroke-linecap="round" />
    <rect x="236" y="196" width="36" height="36" rx="4" fill="none" stroke="#ffffff" stroke-width="3" />
  </g>

  <!-- Dictionary Tag / Star -->
  <g transform="translate(320, 290) scale(0.8)">
    <circle cx="40" cy="40" r="30" fill="#3b82f6" filter="url(#shadow)"/>
    <path d="M 40 22 L 45 35 L 59 35 L 48 43 L 52 56 L 40 47 L 28 56 L 32 43 L 21 35 L 35 35 Z" fill="#ffffff" />
  </g>
</svg>
